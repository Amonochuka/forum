{{ define "f_comment" }}
<div class="f-comment" id="f-comment-{{ .ID }}" data-id="{{ .ID }}">
 
  <div class="f-comment-header">
    <img class="f-avatar" src="{{ /static/images/default-avatar.png }}" alt="{{ .AuthorName }}">
    <span class="f-author">{{ .AuthorName }}</span>
    <!-- {{ if .Badge }}<span class="f-badge">{{ .Badge }}</span>{{ end }} -->
    <span class="f-time">{{ .CreatedAt }}</span>
  </div>
 
  <p class="f-body">{{ .Body }}</p>
 
  <div class="f-actions">
    <span class="f-likes" id="f-likes-{{ .ID }}">{{ .Likes }}</span>
    <button onclick="fVote({{ .ID }}, 'up', this)">▲</button>
    <button onclick="fVote({{ .ID }}, 'down', this)">▼</button>
    <button onclick="fToggleReply({{ .ID }})">Reply</button>
    {{ if gt .ReplyCount 0 }}
      <button id="f-view-replies-{{ .ID }}" onclick="fLoadReplies({{ .ID }}, this)">
        {{ .ReplyCount }} {{ if eq .ReplyCount 1 }}reply{{ else }}replies{{ end }}
      </button>
    {{ end }}
  </div>
 
  {{/* Reply form, hidden by default */}}
  <div id="f-reply-form-{{ .ID }}" style="display:none;" class="f-reply-form">
    <textarea id="f-reply-text-{{ .ID }}" placeholder="Write a reply..." rows="2"></textarea>
    <button onclick="fSubmitReply({{ .ID }}, 'f-reply-text-{{ .ID }}', 'f-replies-{{ .ID }}')">Reply</button>
    <button onclick="fToggleReply({{ .ID }})">Cancel</button>
  </div>
 
  {{/* Replies container, filled by fLoadReplies() */}}
  <div id="f-replies-{{ .ID }}" class="f-replies"></div>
 
</div>
{{ end }}
